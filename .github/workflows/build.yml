name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lucky-today-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK (universal)
        run: flutter build apk --release

      - name: Build release APK (split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: 오늘의 행운 ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🍀 오늘의 행운 ${{ steps.get_version.outputs.VERSION }}

            ### 설치 방법
            1. 아래 APK 파일을 다운로드하세요
            2. Android 기기에서 **설정 > 알 수 없는 앱 설치** 허용
            3. APK 파일을 실행하여 설치

            ### APK 종류
            - `app-arm64-v8a-release.apk` — 최신 64비트 기기 (권장)
            - `app-armeabi-v7a-release.apk` — 구형 32비트 기기
            - `app-release.apk` — 모든 기기 호환 (용량 큼)

            ### 테스트 계정
            | 역할 | 이메일 | 비밀번호 |
            |---|---|---|
            | 일반 사용자 | user@demo.com | user1234 |
            | 관리자 | admin@demo.com | admin1234 |
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          draft: false
          prerelease: false
