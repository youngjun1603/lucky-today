name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /lucky-today/

      - name: Generate OG image
        run: |
          sudo apt-get install -y fonts-noto-cjk
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          W, H = 1200, 630
          img = Image.new('RGB', (W, H), color=(245, 166, 35))
          draw = ImageDraw.Draw(img)

          # 하단 그라데이션 오버레이
          for i in range(H):
              alpha = int(90 * i / H)
              draw.line([(0, i), (W, i)], fill=(200, 120, 10, alpha))

          # 한국어 폰트 탐색
          font_paths = [
              "/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc",
              "/usr/share/fonts/opentype/noto/NotoSansCJKkr-Bold.otf",
              "/usr/share/fonts/truetype/noto/NotoSansCJK-Bold.ttc",
              "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
          ]
          font_big = font_mid = font_sm = None
          for fp in font_paths:
              if os.path.exists(fp):
                  font_big = ImageFont.truetype(fp, 110)
                  font_mid = ImageFont.truetype(fp, 52)
                  font_sm  = ImageFont.truetype(fp, 38)
                  break
          if not font_big:
              font_big = font_mid = font_sm = ImageFont.load_default()

          # 카드 배경
          card = Image.new('RGBA', (W, H), (0, 0, 0, 0))
          cd = ImageDraw.Draw(card)
          cd.rounded_rectangle([(80, 140), (1120, 500)], radius=32,
                                fill=(255, 255, 255, 45))
          img.paste(Image.alpha_composite(img.convert('RGBA'), card).convert('RGB'))
          draw = ImageDraw.Draw(img)

          # 텍스트
          draw.text((W//2, 255), "오늘의 행운", fill="white",
                    font=font_big, anchor="mm")
          draw.text((W//2, 378), "Lucky Today", fill=(255, 240, 180),
                    font=font_mid, anchor="mm")
          draw.text((W//2, 450), "매일 새로운 행운이 당신을 기다립니다 🍀",
                    fill=(255, 255, 255), font=font_sm, anchor="mm")

          os.makedirs("build/web/images", exist_ok=True)
          img.save("build/web/images/og-image.png")
          print("OG image generated: build/web/images/og-image.png")
          PYEOF

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
