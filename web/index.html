<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="매일 새로운 행운이 당신을 기다립니다. 포인트 배팅으로 룰렛에 도전하세요!">

  <!-- Open Graph (카카오톡/SNS 공유 미리보기) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://youngjun1603.github.io/lucky-today/">
  <meta property="og:title" content="🍀 오늘의 행운 - Lucky Today">
  <meta property="og:description" content="매일 새로운 행운이 당신을 기다립니다. 포인트 배팅으로 룰렛에 도전하세요!">
  <meta property="og:image" content="https://youngjun1603.github.io/lucky-today/images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="오늘의 행운">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="🍀 오늘의 행운 - Lucky Today">
  <meta name="twitter:description" content="매일 새로운 행운이 당신을 기다립니다. 포인트 배팅으로 룰렛에 도전하세요!">
  <meta name="twitter:image" content="https://youngjun1603.github.io/lucky-today/images/og-image.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="오늘의 행운">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>🍀 오늘의 행운 - Lucky Today</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    키오스크 연동: postMessage 프로토콜
    ─────────────────────────────────────────────────────────────────
    URL 파라미터:
      ?kiosk=1           키오스크 모드 활성화
      &uid=USER_EMAIL    자동 로그인할 사용자 ID (이메일)
      &origin=URL        postMessage 허용 출처 (보안 강화 시 설정)

    키오스크 → 웹 (postMessage):
      { "type": "KIOSK_INIT",             "data": { "kioskId": "..." } }
      { "type": "KIOSK_START_FREE_DRAW",  "data": {} }
      { "type": "KIOSK_START_BET",        "data": { "betAmount": 5 } }
      { "type": "KIOSK_HEARTBEAT",        "data": { "timestamp": 0 } }

    웹 → 키오스크 (parent.postMessage):
      { "type": "WEB_READY",          "data": { "version": "1.0.0" } }
      { "type": "WEB_DRAW_COMPLETE",   "data": { "drawType", "betAmount", "winAmount",
                                                  "newGamePoints", "prizeLabel", "couponWon" } }
      { "type": "WEB_BALANCE_UPDATE",  "data": { "gamePoints", "remainingFreeDraws",
                                                  "remainingPaidDraws" } }
      { "type": "WEB_ERROR",           "data": { "code", "message" } }
      { "type": "WEB_SESSION_EXPIRED", "data": {} }

    데모 페이지: kiosk_demo.html
    ─────────────────────────────────────────────────────────────────
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
